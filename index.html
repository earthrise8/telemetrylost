<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry Lost</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="dev-reset-btn">WIPE LOCAL DATA</button>

    <div id="main-wrapper">
        <div id="game-container">
            <div id="ocular-interface" class="hidden">
                <div id="event-text"></div>
            </div>
            <div id="info-panel">
                <div id="stats-display">
                    <p>Name: <span id="character-name"></span></p>
                    <p>Health: <span id="health"></span></p>
                    <p>Banked kCals: <span id="banked-kcals"></span></p>
                    <p>Carried kCals: <span id="carried-kcals"></span></p>
                    <p>Energy: <span id="energy"></span></p>
                    <p>Time: <span id="time"></span></p>
                    <p>Coordinates: <span id="coordinates"></span></p>
                    <hr>
                    <p>Suit: <span id="player-suit"></span></p>
                    <p>Tool: <span id="player-tool"></span></p>
                </div>
                <div id="map-container">
                    <div id="map-grid"></div>
                </div>
            </div>
            <div id="action-buttons">
                <!-- In-game action buttons are dynamically generated by script.js -->
            </div>
        </div>

        <div id="chat-container">
            <h2>Mission Comms</h2>
            <div id="chat-log"></div>
        </div>
    </div>

    <div id="cyclerOverlay" class="hidden">
        <div id="cyclerLog">
            <h2>Cycler Log</h2>
            <p>Cycler ID: <span id="cycler-id-log"></span></p>
            <p>Cause of Failure: <span id="failure-cause-log"></span></p>
            <p>Failure Code: <span id="failure-code-log"></span></p>
            <p>kCals Banked: <span id="kcals-banked-log"></span></p>
        </div>
        <button id="cycleBtn">Continue</button>
    </div>

    <div id="store-overlay" class="hidden">
        <div id="store-container">
            <h2>Base Requisition</h2>
            <p>Available kCals: <span id="store-kcals"></span></p>
            <div id="store-items"></div>
            <button id="close-store-btn" class="store-button">Exit</button>
        </div>
    </div>

    <div id="name-screen">
        <h1>New Cycler Instance</h1>
        <input type="text" id="new-character-name-input" placeholder="Enter Cycler ID" maxlength="15">
        <button id="start-game-btn">Initiate Cycle</button>
    </div>

    <div id="setup-screen" class="hidden">
        <h1>Select Loadout</h1>
        <div id="name-selection">
            <h2>Enter Cycler ID:</h2>
            <input type="text" id="character-name-input" placeholder="e.g., SID-849" maxlength="15">
        </div>
        <div class="loadout-container">
            <div id="suit-selection">
                <h2>Choose a Suit</h2>
            </div>
            <div id="tool-selection">
                <h2>Choose a Tool</h2>
            </div>
        </div>
        <button id="start-expedition-btn">Start Expedition</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
