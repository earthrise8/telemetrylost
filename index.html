<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Last Ocular Connection</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <div id="game">

    <div id="header">
      <h1>OCULAR FEED</h1>
      <div id="persistent">Banked Biotokens: <span id="bankedBio">0</span> • Deaths: <span id="deathCount">0</span></div>
    </div>

    <div id="textBox">
      <div id="eventText">Initializing Ocular...</div>
    </div>

    <div id="loadout" class="panel">
      <div id="pixelArtHolder"><img id="pixelArt" src="" alt="pixel art placeholder"/></div>
      <h3>Choose Suit</h3>
      <div id="suitChoices"></div>
      <h3>Choose Tool</h3>
      <div id="toolChoices"></div>
      <button id="startBtn">Deploy Instance</button>
    </div>

    <div id="actions" class="panel hidden">
      <div id="quadrantButtons"></div>
      <div id="actionButtons"></div>
    </div>

    <div id="stats" class="panel">
      <div>Health: <span id="healthStat">100</span></div>
      <div>Temp: <span id="tempStat">100</span></div>
      <div>Aggression: <span id="aggroStat">0</span></div>
      <div>Biotokens (run): <span id="bioStat">0</span></div>
    </div>

  </div>

  <div id="cyclerOverlay" class="hidden">
    <div id="cyclerLog"></div>
    <button id="cycleBtn">Cycle New Instance</button>
  </div>

  <!-- TITLE + INTRO -->
  <div id="titleScreen">
    <div id="titleCard">
      <h2>LAST OCULAR CONNECTION</h2>
      <p id="subtitle">An expendable survey instance explores a frozen world.</p>
      <button id="titleStart" type="button">START</button>
    </div>
  </div>

  <div id="introScreen" class="hidden">
    <div id="introCard">
      <div id="introText"></div>
      <div id="introButtons">
        <button id="introNext" type="button">Next</button>
      </div>
    </div>
  </div>

  <div id="namePrompt" class="hidden">
    <div id="nameCard">
      <div>Enter Cycler Designation:</div>
      <input id="cyclename" type="text" maxlength="20" placeholder="e.g. Unit-17" />
      <div><button id="nameSubmit" type="button">Confirm</button></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
