<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Last Ocular Connection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="game">

    <div id="header">
      <h1>OCULAR FEED</h1>
      <div id="persistent">Banked Biotokens: <span id="bankedBio">0</span> • Deaths: <span id="deathCount">0</span></div>
    </div>

    <div id="textBox">
      <div id="eventText">Initializing Ocular...</div>
    </div>

    <div id="loadout" class="panel">
      <h3>Choose Suit</h3>
      <div id="suitChoices"></div>
      <h3>Choose Tool</h3>
      <div id="toolChoices"></div>
      <button id="startBtn">Deploy Instance</button>
    </div>

    <div id="actions" class="panel hidden">
      <div id="quadrantButtons"></div>
      <div id="actionButtons"></div>
    </div>

    <div id="stats" class="panel">
      <div>Health: <span id="healthStat">100</span></div>
      <div>Temp: <span id="tempStat">100</span></div>
      <div>Aggression: <span id="aggroStat">0</span></div>
      <div>Biotokens (run): <span id="bioStat">0</span></div>
    </div>

  </div>

  <div id="cyclerOverlay" class="hidden">
    <div id="cyclerLog"></div>
    <button id="cycleBtn">Cycle New Instance</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
